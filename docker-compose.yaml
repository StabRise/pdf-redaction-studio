services:

  db:
    image: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: "db"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10

  backend:
    image: stabrise/pdf-redaction-studio-backend:0.1.0
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/api/schema/swagger-ui/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  api:
    image: stabrise/pdf-redaction-api:latest
    restart: always
    env_file:
      - .env
    expose:
      - "8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: curl -f http://localhost:8002/api/docs || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    environment:
      PDF_REDACTION_API_HOST: 0.0.0.0
      PDF_REDACTION_API_PORT: 8002
      PDF_REDACTION_API_ENABLE_DEIDENTIFICATION_API: True
      TIMEOUT: 190
      GRACEFUL_TIMEOUT: 190

  studio:  &main_app
    image: stabrise/pdf-redaction-studio-frontend:latest

    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      api:
        condition: service_healthy
