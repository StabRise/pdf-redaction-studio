services:

  db:
    image: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: "db"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10

  backend:
    image: stabrise/pdf-redaction-studio-backend:latest
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  api:
    image: stabrise/pdf-redaction-api:latest
    restart: always
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - .env
    expose:
      - "8002"
    ports:
      - "8002:8002"

    environment:
      HF_HOME: /root/.cache/huggingface
      PDF_REDACTION_API_HOST: 0.0.0.0
      PDF_REDACTION_API_PORT: 8002
      PDF_REDACTION_API_ENABLE_DEIDENTIFICATION_API: True
      TIMEOUT: 190
      GRACEFUL_TIMEOUT: 190

  studio:  &main_app
    image: stabrise/pdf-redaction-studio-frontend:latest

    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    depends_on:
      - backend
      - api
